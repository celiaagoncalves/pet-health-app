name: pet_health
description: A cross-platform app to manage your pets' health, vaccinations and wellbeing.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Local notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # User preferences
  shared_preferences: ^2.3.3

  # Internationalization
  intl: any

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
